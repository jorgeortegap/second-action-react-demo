
name: Test Project
on: push
jobs:
  test:
    runs-on: ubuntu-slim
    steps:
        - name: Get code
          uses: actions/checkout@v7
        - name: Set up Node.js
          uses: actions/setup-node@v6
          with:
            node-version: 'latest'
        - name: Install dependencies
          run: npm ci
        - name: Run tests
          run: npm test